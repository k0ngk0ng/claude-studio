name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    environment: production
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        if: env.CSC_LINK != ''
        env:
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode the .p12 certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CSC_LINK" | base64 --decode > "$CERTIFICATE_PATH"

          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate into keychain
          security import "$CERTIFICATE_PATH" -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add keychain to search list (preserve existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify certificate was imported
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          echo "=== Certificate imported successfully ==="

      - name: Sync version from git tag
        run: npm run version:sync

      - name: Verify signing identity before build
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== All codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== Developer ID identities ==="
          security find-identity -v -p codesigning | grep "Developer ID" || echo "WARNING: No Developer ID identity found!"

      - name: Make distributables
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_STUDIO_CDN_URL: ${{ vars.ALIYUN_OSS_CDN_URL }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          retention-days: 5

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from git tag
        run: npm run version:sync

      - name: Extract version
        id: version
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"

      - name: Package app
        run: npm run package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_STUDIO_CDN_URL: ${{ vars.ALIYUN_OSS_CDN_URL }}

      - name: Install NSIS
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            Write-Host "NSIS already installed"
            Get-Item $nsisPath
          } else {
            Write-Host "Installing NSIS via winget..."
            # Try winget first
            winget install NSIS.NSIS --silent --accept-package-agreements --accept-source-agreements
            if (-not (Test-Path $nsisPath)) {
              Write-Host "Winget failed, trying chocolatey..."
              choco install nsis -y
            }
            if (Test-Path $nsisPath) {
              Write-Host "NSIS installed successfully"
              Get-Item $nsisPath
            } else {
              Write-Host "ERROR: NSIS installation failed"
              exit 1
            }
          }

      - name: Build NSIS installer
        shell: pwsh
        run: |
          # Get the github workspace path
          $workspace = $env:GITHUB_WORKSPACE
          if (-not $workspace) {
            $workspace = $PWD.Path
          }
          Write-Host "Workspace: $workspace"

          # Find the packaged app directory using absolute path
          $appDir = Get-ChildItem -Path "$workspace\out" -Directory | Where-Object { $_.Name -match "win32" } | Select-Object -First 1
          if (-not $appDir) {
            Write-Host "ERROR: Could not find packaged app directory"
            Get-ChildItem "$workspace\out"
            exit 1
          }
          $appDirFull = Join-Path "$workspace\out" $appDir.Name
          Write-Host "Found app directory: $appDirFull"

          # Copy to installer directory
          $installerDir = Join-Path $workspace "installer"
          $appDest = Join-Path $installerDir "app"

          # Remove existing app directory if exists
          if (Test-Path $appDest) {
            Remove-Item $appDest -Recurse -Force
          }

          Copy-Item -Path $appDirFull -Destination $appDest -Recurse -Force
          Write-Host "Copied app to installer\app"

          # Build NSIS installer
          Set-Location $installerDir
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V4 "/DPRODUCT_VERSION=${{ steps.version.outputs.VERSION }}" "installer.nsi"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            installer/ClaudeStudio-*-Setup.exe
          retention-days: 5

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from git tag
        run: npm run version:sync

      - name: Make distributables
        run: ./node_modules/.bin/electron-forge make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_STUDIO_CDN_URL: ${{ vars.ALIYUN_OSS_CDN_URL }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.zip
          retention-days: 5

  release-server:
    name: Release (Server)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Sync version from git tag
        working-directory: server
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Setting server version to $VERSION"
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Package server tarball
        run: |
          mkdir -p server-release
          cp -r server/dist server-release/
          cp server/package.json server-release/
          cp server/admin.mjs server-release/
          cp server/.env.example server-release/
          cp server/claude-studio-server.service server-release/
          cp server/deploy.sh server-release/
          cp server/upgrade.sh server-release/
          cp server/README.md server-release/
          # Install production deps into tarball (no --ignore-scripts, better-sqlite3 needs native build)
          cd server-release
          npm install --omit=dev
          cd ..
          tar -czf claude-studio-server.tar.gz -C server-release .

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-server
          path: claude-studio-server.tar.gz
          retention-days: 5

  release-mobile:
    name: Release (Mobile — iOS & Android)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Sync version from git tag
        working-directory: mobile
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Setting mobile version to $VERSION"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf-8'));
            app.expo.version = '$VERSION';
            if (!app.expo.cli) app.expo.cli = {};
            app.expo.cli.appVersionSource = 'remote';
            // Set project ID if not already set
            if (!app.expo.extra?.eas?.projectId) {
              if (!app.expo.extra) app.expo.extra = {};
              if (!app.expo.extra.eas) app.expo.extra.eas = {};
              app.expo.extra.eas.projectId = 'claude-studio-mobile';
            }
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # - name: Build iOS
      #   working-directory: mobile
      #   run: eas build --platform ios --profile production --non-interactive --no-wait
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        working-directory: mobile
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  publish-release:
    name: Publish GitHub Release & Upload to OSS
    runs-on: ubuntu-latest
    needs: [release-macos, release-windows, release-linux, release-server]
    environment: production
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/release-macos/**/*
            artifacts/release-windows/**/*
            artifacts/release-linux/**/*
            artifacts/release-server/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Upload to Aliyun OSS ────────────────────────────────────────
      - name: Extract tag version
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install ossutil
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil --version

      - name: Configure ossutil
        run: |
          ossutil config \
            -e https://${{ secrets.ALIYUN_OSS_ENDPOINT }} \
            -i ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          echo "Endpoint: https://${{ secrets.ALIYUN_OSS_ENDPOINT }}"
          echo "Bucket: ${{ secrets.ALIYUN_OSS_BUCKET }}"
          # Verify access
          ossutil ls oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/ --limited-num 1 || echo "Warning: cannot list bucket"

      - name: Flatten artifacts for upload
        run: |
          mkdir -p upload/
          find artifacts/ -type f \
            -exec cp {} upload/ \;
          # Replace spaces with dots in filenames (match GitHub Release behavior)
          cd upload/
          for f in *; do
            newname="$(echo "$f" | tr ' ' '.')"
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done
          cd ..
          echo "Files to upload:"
          ls -lh upload/

      - name: Upload to OSS — claude-studio/releases/${{ steps.version.outputs.TAG }}/
        run: |
          ossutil cp -r upload/ \
            oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/${{ steps.version.outputs.TAG }}/ \
            --force

      - name: Upload to OSS — claude-studio/releases/latest/
        run: |
          # Create a directory with non-versioned filenames for latest/
          mkdir -p upload-latest/
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Escape dots in version for sed (dots are regex metacharacters)
          VERSION_ESCAPED=$(echo "$VERSION" | sed 's/\./\\./g')
          # Copy only installer files (without version numbers in name)
          for f in upload/*; do
            filename=$(basename "$f")
            # Remove version pattern: -0.1.25- or _0.1.25_ from filename
            newname=$(echo "$filename" | sed "s/-${VERSION_ESCAPED}-/-/;s/_${VERSION_ESCAPED}_/_/")
            cp "$f" "upload-latest/$newname"
          done
          echo "Latest files (without version):"
          ls -lh upload-latest/
          # Upload to latest/
          ossutil cp -r upload-latest/ \
            oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/latest/ \
            --force

      - name: Generate release-info.json
        run: |
          CDN_BASE="${{ vars.ALIYUN_OSS_CDN_URL }}/claude-studio/releases/${{ steps.version.outputs.TAG }}"
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo '{}' > release-info.json

          # Build JSON with versioned file URLs
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('upload/');
            const base = '${CDN_BASE}';
            const tag = '${TAG}';
            const urls = { version: tag.replace('v',''), cdnBase: base, files: {} };
            for (const f of files) {
              urls.files[f] = base + '/' + f;
            }
            fs.writeFileSync('release-info.json', JSON.stringify(urls, null, 2));
            console.log('Versioned release-info.json:');
            console.log(JSON.stringify(urls, null, 2));
          "

          # Generate release-info.json for latest/ (non-versioned filenames, but cdnBase points to versioned path)
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('upload/');
            const baseVersioned = '${CDN_BASE}';
            const baseLatest = '${CDN_BASE}'.replace('/' + '${TAG}', '/latest');
            const tag = '${TAG}';
            const version = tag.replace('v','');
            // For latest, cdnBase points to versioned path so downloads work
            const urls = { version: version, cdnBase: baseVersioned, files: {} };
            for (const f of files) {
              // Remove version from filename: ClaudeStudio-0.1.25-Setup.exe -> ClaudeStudio-Setup.exe
              const newname = f.replace('-' + version, '').replace('_' + version + '_', '_');
              urls.files[newname] = baseVersioned + '/' + f;  // Point to actual versioned file
            }
            fs.writeFileSync('release-info-latest.json', JSON.stringify(urls, null, 2));
            console.log('Latest release-info.json:');
            console.log(JSON.stringify(urls, null, 2));
          "

      - name: Upload release-info.json to OSS
        run: |
          # Upload versioned release-info.json to versioned directory
          ossutil cp release-info.json \
            oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/${{ steps.version.outputs.TAG }}/release-info.json \
            --force
          # Upload non-versioned release-info.json to latest/
          ossutil cp release-info-latest.json \
            oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/latest/release-info.json \
            --force

      - name: Verify OSS upload
        run: |
          echo "=== claude-studio/releases/${{ steps.version.outputs.TAG }}/ ==="
          ossutil ls oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/${{ steps.version.outputs.TAG }}/ --short
          echo ""
          echo "=== claude-studio/releases/latest/ ==="
          ossutil ls oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/latest/ --short

      - name: Clean up old versions (keep last 10)
        run: |
          # List all version directories
          ALL_VERSIONS=$(ossutil ls oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/ | grep 'oss://' | grep -E '/v[0-9]+\.[0-9]+' | sed 's|.*/||' | sed 's|/$||' | sort -V)

          # Get the list of versions to keep (last 10)
          KEEP_VERSIONS=$(echo "$ALL_VERSIONS" | tail -n 10)
          echo "Versions to keep (last 10):"
          echo "$KEEP_VERSIONS"

          # Delete old versions
          for dir in $ALL_VERSIONS; do
            if echo "$KEEP_VERSIONS" | grep -q "^$dir$"; then
              echo "Keeping: $dir"
            else
              echo "Deleting: $dir"
              ossutil rm "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/claude-studio/releases/$dir/" -r --force
            fi
          done

      - name: Refresh CDN cache
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          python3 -m pip install -q aliyun-python-sdk-core aliyun-python-sdk-cdn

          python3 - <<'PY'
          import os
          from aliyunsdkcore.client import AcsClient
          from aliyunsdkcdn.request.v20180510.RefreshObjectCachesRequest import RefreshObjectCachesRequest

          ak = os.environ["ALIYUN_ACCESS_KEY_ID"]
          sk = os.environ["ALIYUN_ACCESS_KEY_SECRET"]
          tag = os.environ["TAG"]

          client = AcsClient(ak, sk, "cn-hangzhou")

          urls = [
              f"https://cdn.ichenj.com/claude-studio/releases/{tag}/release-info.json",
              "https://cdn.ichenj.com/claude-studio/releases/latest/release-info.json",
          ]

          req = RefreshObjectCachesRequest()
          req.set_accept_format("json")
          req.set_ObjectType("File")
          req.set_ObjectPath("\n".join(urls))  # 多个 URL 用换行拼接

          resp = client.do_action_with_exception(req)
          print(resp.decode("utf-8", errors="ignore"))
          PY
